<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Page Not Found | DG Electronics</title>
  <meta name="description" content="The page you are looking for could not be found." />
  <meta name="robots" content="noindex, nofollow" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="/css/style.css?v=3.0" />
  <style>
    .error-page { display:flex; flex-direction:column; align-items:center; justify-content:center; min-height:60vh; padding:3rem 1rem; text-align:center; }
    .error-page .error-code { font-size:8rem; font-weight:800; color:#D4AF37; line-height:1; margin-bottom:1rem; }

    .error-page .error-msg { font-size:1rem; color:#BDBDBD; margin-bottom:2rem; max-width:400px; }

<body>
  <header class="navbar" id="navbar">
    <a class="brand" href="/"><img src="/images/logo.svg" alt="DG Electronics" width="40" height="40" /><span>DG Electronics</span></a>

  <main class="error-page">
    <div class="error-code">404</div>
    <h1 class="error-title">Page Not Found</h1>

    <div class="error-actions">

      <a href="/contact" class="btn btn-secondary">Contact Support</a>

  <footer style="margin-top:3rem;padding:1.5rem;text-align:center;color:#BDBDBD;font-size:0.85rem;border-top:1px solid rgba(212,175,55,0.08);">
