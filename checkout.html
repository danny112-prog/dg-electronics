<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Checkout | DG Electronics</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    .checkout-page { max-width: 900px; margin: 2rem auto; padding: 0 5%; }
    .checkout-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 2rem; }
    .checkout-form { background: var(--white); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-sm); }
    .checkout-form h2 { color: var(--primary-dark); margin-bottom: 1.5rem; font-size: 1.3rem; }
    .form-group { margin-bottom: 1.2rem; }
    .form-group label { display: block; font-weight: 600; color: var(--text); margin-bottom: 0.4rem; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; padding: 0.8rem 1rem; border: 1px solid #e0e6f0; border-radius: 12px; font-size: 0.95rem; outline: none; transition: border-color 0.3s; background: #f8faff; font-family: inherit; }
    .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); box-shadow: 0 0 0 3px rgba(61,167,255,0.15); background: var(--white); }
    .form-group textarea { resize: vertical; min-height: 80px; }
    .order-summary { background: var(--white); border-radius: var(--radius-lg); padding: 2rem; box-shadow: var(--shadow-sm); align-self: start; position: sticky; top: 100px; }
    .order-summary h2 { color: var(--primary-dark); margin-bottom: 1.5rem; font-size: 1.3rem; }
    .summary-item { display: flex; gap: 0.8rem; padding: 0.8rem 0; border-bottom: 1px solid #f0f3f9; }
    .summary-item img { width: 60px; height: 60px; object-fit: cover; border-radius: 10px; }
    .summary-item-info { flex: 1; }
    .summary-item-name { font-weight: 600; color: var(--primary-dark); font-size: 0.9rem; }
    .summary-item-price { color: var(--accent); font-weight: 700; font-size: 0.85rem; }
    .summary-item-qty { color: var(--muted); font-size: 0.82rem; }
    .summary-totals { margin-top: 1rem; padding-top: 1rem; border-top: 2px solid #f0f3f9; }
    .summary-row { display: flex; justify-content: space-between; margin-bottom: 0.5rem; font-size: 0.95rem; }
    .summary-row.total { font-weight: 700; font-size: 1.15rem; color: var(--primary-dark); padding-top: 0.5rem; border-top: 1px solid #e0e6f0; }
    .summary-row.total span:last-child { color: var(--accent); }
    .paystack-btn { width: 100%; margin-top: 1.5rem; padding: 1rem; background: #0f2c56; color: #fff; border: none; border-radius: 12px; font-size: 1.05rem; font-weight: 700; cursor: pointer; transition: all 0.3s; }
    .paystack-btn:hover { background: #1a3d6d; transform: translateY(-2px); box-shadow: var(--shadow); }
    .paystack-btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .paystack-badge { display: flex; align-items: center; justify-content: center; gap: 0.5rem; margin-top: 0.8rem; color: var(--muted); font-size: 0.8rem; }
    .paystack-badge img { height: 20px; }
    .back-to-cart { display: inline-flex; align-items: center; gap: 0.4rem; color: var(--accent); font-weight: 600; margin-bottom: 1.5rem; cursor: pointer; transition: color 0.3s; }
    .back-to-cart:hover { color: var(--accent-hover); }
    @media (max-width: 768px) { .checkout-grid { grid-template-columns: 1fr; } .order-summary { position: static; } }
  </style>
</head>
<body>
  <header class="navbar">
    <a class="brand" href="index.html">
      <img src="images/logo.svg" alt="DG Electronics logo" width="42" height="42" />
      <span>DG Electronics</span>
    </a>
    <nav class="nav-links">
      <a href="index.html">Home</a>
      <a href="index.html#products">Products</a>
      <a href="admin.html">Admin</a>
    </nav>
  </header>

  <main class="checkout-page">
    <a class="back-to-cart" href="javascript:history.back()">&larr; Back to Cart</a>
    <h1 style="color: var(--primary-dark); margin-bottom: 1.5rem;">Checkout</h1>

    <div class="checkout-grid">
      <!-- Customer Form -->
      <div class="checkout-form">
        <h2>Delivery Information</h2>
        <form id="checkoutForm">
          <div class="form-group">
            <label for="customerName">Full Name *</label>
            <input type="text" id="customerName" name="customer_name" required placeholder="e.g. Daniel Okolie" />
          </div>
          <div class="form-group">
            <label for="customerEmail">Email Address *</label>
            <input type="email" id="customerEmail" name="customer_email" required placeholder="e.g. daniel@example.com" />
          </div>
          <div class="form-group">
            <label for="customerPhone">Phone Number *</label>
            <input type="tel" id="customerPhone" name="customer_phone" required placeholder="e.g. +234 903 135 5560" />
          </div>
          <div class="form-group">
            <label for="deliveryAddress">Delivery Address *</label>
            <textarea id="deliveryAddress" name="delivery_address" required placeholder="Street address, city, state..."></textarea>
          </div>
        </form>
      </div>

      <!-- Order Summary -->
      <div class="order-summary">
        <h2>Order Summary</h2>
        <div id="summaryItems"></div>
        <div class="summary-totals">
          <div class="summary-row"><span>Subtotal</span><span id="summarySubtotal">₦0</span></div>
          <div class="summary-row"><span>Delivery</span><span id="summaryDelivery">₦0</span></div>
          <div class="summary-row total"><span>Total</span><span id="summaryTotal">₦0</span></div>
        </div>
        <button class="paystack-btn" id="payButton" disabled>Pay with Paystack</button>
        <div class="paystack-badge">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>
          Secured by Paystack
        </div>
      </div>
    </div>
  </main>

  <!-- Paystack Script -->
  <script src="https://js.paystack.co/v1/inline.js"></script>
  <script>
    const API_BASE = window.location.origin + '/api';
    let cart = JSON.parse(localStorage.getItem('dg_cart') || '[]');
    let orderData = null;

    // ── Render Summary ──
    function renderSummary() {
      const summaryEl = document.getElementById('summaryItems');
      if (cart.length === 0) {
        summaryEl.innerHTML = '<p style="color: var(--muted); text-align: center; padding: 2rem 0;">Your cart is empty</p>';
        document.getElementById('payButton').disabled = true;
        return;
      }

      summaryEl.innerHTML = cart.map(item => `
        <div class="summary-item">
          <img src="${item.image}" alt="${item.name}" />
          <div class="summary-item-info">
            <div class="summary-item-name">${item.name}</div>
            <div class="summary-item-price">₦${item.price.toLocaleString()}</div>
            <div class="summary-item-qty">Qty: ${item.qty}</div>
          </div>
        </div>
      `).join('');

      const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      const delivery = subtotal >= 500000 ? 0 : 2000;
      const total = subtotal + delivery;

      document.getElementById('summarySubtotal').textContent = `₦${subtotal.toLocaleString()}`;
      document.getElementById('summaryDelivery').textContent = delivery === 0 ? 'FREE' : `₦${delivery.toLocaleString()}`;
      document.getElementById('summaryTotal').textContent = `₦${total.toLocaleString()}`;
      document.getElementById('payButton').disabled = false;
    }

    // ── Paystack Payment ──
    document.getElementById('payButton').addEventListener('click', async () => {
      const form = document.getElementById('checkoutForm');
      if (!form.reportValidity()) return;

      const btn = document.getElementById('payButton');
      btn.disabled = true;
      btn.textContent = 'Processing...';

      const subtotal = cart.reduce((sum, item) => sum + item.price * item.qty, 0);
      const delivery = subtotal >= 500000 ? 0 : 2000;
      const total = subtotal + delivery;

      const customerName = document.getElementById('customerName').value.trim();
      const customerEmail = document.getElementById('customerEmail').value.trim();
      const customerPhone = document.getElementById('customerPhone').value.trim();
      const deliveryAddress = document.getElementById('deliveryAddress').value.trim();

      // Create order first (pending)
      try {
        const orderRes = await fetch(`${API_BASE}/orders`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            customer_name: customerName,
            customer_email: customerEmail,
            customer_phone: customerPhone,
            delivery_address: deliveryAddress,
            items: cart.map(item => ({ product_id: item.id, quantity: item.qty }))
          })
        });

        const orderResult = await orderRes.json();
        if (!orderResult.success) throw new Error('Failed to create order');

        orderData = { ...orderResult, customer_name: customerName, customer_email: customerEmail };

        // Initialize Paystack
        const handler = PaystackPop.setup({
          key: 'pk_test_xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx', // Replace with your Paystack public key
          email: customerEmail,
          amount: total * 100, // Paystack uses kobo
          currency: 'NGN',
          ref: `DG-${orderResult.order_id}-${Date.now()}`,
          metadata: {
            custom_fields: [
              { display_name: "Order ID", variable_name: "order_id", value: orderResult.order_id },
              { display_name: "Customer Name", variable_name: "customer_name", value: customerName }
            ]
          },
          callback: async function(response) {
            // Payment successful
            try {
              await fetch(`${API_BASE}/orders/${orderResult.order_id}/payment`, {
                method: 'PATCH',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                  payment_status: 'paid',
                  paystack_ref: response.reference
                })
              });

              // Clear cart and redirect
              localStorage.removeItem('dg_cart');
              window.location.href = `/confirmation?order_id=${orderResult.order_id}&ref=${response.reference}`;
            } catch (err) {
              alert('Payment was successful but we had trouble confirming. Please contact support with reference: ' + response.reference);
            }
          },
          onClose: function() {
            btn.disabled = false;
            btn.textContent = 'Pay with Paystack';
          }
        });
        handler.openIframe();
      } catch (err) {
        alert('Error: ' + err.message);
        btn.disabled = false;
        btn.textContent = 'Pay with Paystack';
      }
    });

    renderSummary();
  </script>
</body>
</html>
